version: "3.8"

services:
  app:
    build: .
    restart: unless-stopped
    expose:
      - "3000"
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3000}/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/sanctions
      - PRIVATE_LISTS_DIR=/app/private-lists
    volumes:
      - ./private-lists:/app/private-lists:ro
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sanctions
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sanctions"]
      interval: 10s
      timeout: 10s
      retries: 30
      start_period: 60s

volumes:
  postgres_data:
